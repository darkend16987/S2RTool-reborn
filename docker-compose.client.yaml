# ========================================
# S2RTool Client Docker Compose
# ========================================
# Lightweight file for end-user machines.
# Uses pre-built images from Docker Hub + Watchtower for auto-update.
#
# Quick Start:
#   1. Copy this file and .env to a folder on the client machine
#   2. Edit .env with your GEMINI_API_KEY
#   3. Run: docker-compose -f docker-compose.client.yaml up -d
#
# Auto-Update: Watchtower checks for new images every 5 minutes.
# When the dev pushes to main, GitHub Actions builds new images,
# and Watchtower on your machine will automatically update.
# ========================================

services:
  # Backend service (Flask API)
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME:-darkend16987}/s2rtool-backend:${VERSION:-latest}
    container_name: s2rtool-backend

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    ports:
      - "${BACKEND_PORT:-5001}:5001"

    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=5001
      - HOST=0.0.0.0
      - PYTHONUNBUFFERED=1

    env_file:
      - .env

    volumes:
      - backend-references:/app/references

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - s2rtool-network

  # Frontend service (Nginx)
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME:-darkend16987}/s2rtool-frontend:${VERSION:-latest}
    container_name: s2rtool-frontend

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    ports:
      - "${FRONTEND_PORT:-3001}:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - s2rtool-network

  # Watchtower - Auto-update (OTA)
  # Checks Docker Hub every 5 minutes for new images
  watchtower:
    image: containrrr/watchtower
    container_name: s2rtool-watchtower

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-300}
      - WATCHTOWER_LOG_LEVEL=info

    restart: unless-stopped

    networks:
      - s2rtool-network

networks:
  s2rtool-network:
    driver: bridge

volumes:
  backend-references:
    driver: local
