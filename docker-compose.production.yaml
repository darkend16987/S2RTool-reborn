# ========================================
# S2RTool Production Docker Compose
# ========================================
# Pre-built images from Docker Hub + Watchtower auto-update.
#
# Quick Start:
#   1. Copy this file + .env to target machine
#   2. Edit .env: set GEMINI_API_KEY
#   3. Run: docker-compose -f docker-compose.production.yaml up -d
#
# Auto-Update: Watchtower checks Docker Hub every 5 minutes.
#   Push to main → GitHub Actions builds images → Watchtower updates automatically.
#
# Manual Update:
#   docker-compose -f docker-compose.production.yaml pull
#   docker-compose -f docker-compose.production.yaml up -d
# ========================================

services:
  # Backend (Flask API)
  backend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME:-kael16987}/s2rtool-backend:${VERSION:-latest}
    container_name: s2rtool-backend

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    ports:
      - "${BACKEND_PORT:-5001}:5001"

    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - PORT=5001
      - HOST=0.0.0.0
      - PYTHONUNBUFFERED=1

    env_file:
      - .env

    volumes:
      - backend-references:/app/references
      - render-history:/app/render_history

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    networks:
      - s2rtool-network

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Frontend (Nginx)
  frontend:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_USERNAME:-kael16987}/s2rtool-frontend:${VERSION:-latest}
    container_name: s2rtool-frontend

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

    ports:
      - "${FRONTEND_PORT:-3001}:80"

    depends_on:
      backend:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    networks:
      - s2rtool-network

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Watchtower - OTA Auto-Update
  # Monitors Docker Hub for new images, automatically pulls & restarts.
  # Only updates containers with watchtower label (backend + frontend).
  # To disable: comment out this service or set WATCHTOWER_ENABLED=false
  watchtower:
    image: containrrr/watchtower
    container_name: s2rtool-watchtower

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=${WATCHTOWER_INTERVAL:-300}
      - WATCHTOWER_LOG_LEVEL=info

    restart: unless-stopped

    networks:
      - s2rtool-network

networks:
  s2rtool-network:
    driver: bridge

volumes:
  backend-references:
    driver: local
  render-history:
    driver: local
